<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Skin Journal Quiz - Optimized Version</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Be+Vietnam+Pro:wght@300;400;500;600&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cream: #faf7f2;
    --sand: #e8dfd0;
    --blush: #c9a98a;
    --terra: #8b5e3c;
    --dark: #2c1f14;
    --soft: #f0ebe3;
  }

  /* TRIỆT TIÊU KHOẢNG TRẮNG NGOÀI CÙNG */
  html, body {
    margin: 0 !important;
    padding: 0 !important;
    background: var(--cream);
    overflow-x: hidden;
  }

  body {
    font-family: 'Be Vietnam Pro', sans-serif;
    color: var(--dark);
    padding: 10px 15px !important; /* Chỉ để một chút đệm để không sát mép màn hình */
    line-height: 1.5;
  }

  .quiz-wrap {
    max-width: 800px; /* Độ rộng lớn theo ý bạn */
    margin: 0 auto;
  }

  /* HEADER GỌN GÀNG */
  .quiz-header {
    text-align: center;
    padding: 10px 0 15px; /* Giảm khoảng cách trên dưới */
  }

  .quiz-header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(2.2rem, 6vw, 3.2rem); 
    color: var(--terra);
    margin-bottom: 5px;
  }

  .quiz-header p {
    font-size: 1.1rem;
    color: #7a6a58;
    font-weight: 300;
  }

  /* PROGRESS BAR TIẾT KIỆM DIỆN TÍCH */
  .progress-container { margin-bottom: 20px; }
  .progress-bar {
    height: 6px;
    background: var(--sand);
    border-radius: 10px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--terra);
    transition: width 0.4s ease;
  }
  .progress-label {
    text-align: right;
    font-size: 0.9rem;
    color: var(--blush);
    margin-bottom: 5px;
    font-weight: 600;
  }

  /* CARD CÂU HỎI PHÓNG TO NHƯNG GỌN */
  .question-card {
    background: #fff;
    border-radius: 32px;
    padding: 40px; /* Cân đối khoảng cách bên trong */
    box-shadow: 0 15px 45px rgba(44,31,20,0.08);
    animation: fadeIn 0.5s ease;
  }

  .question-num {
    font-size: 0.85rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--blush);
    font-weight: 600;
    margin-bottom: 10px;
  }

  .question-text {
    font-family: 'Playfair Display', serif;
    font-size: 1.8rem; 
    font-weight: 600;
    line-height: 1.3;
    margin-bottom: 25px;
  }

  .options { display: flex; flex-direction: column; gap: 12px; }
  
  .option-btn {
    background: var(--soft);
    border: 2px solid transparent;
    border-radius: 16px;
    padding: 18px 24px;
    font-size: 1.1rem;
    cursor: pointer;
    text-align: left;
    display: flex;
    align-items: center;
    gap: 15px;
    transition: all 0.2s;
  }

  .option-btn:hover { background: #f5ede2; }
  .option-btn.selected {
    background: #fff;
    border-color: var(--terra);
    color: var(--terra);
    box-shadow: 0 6px 15px rgba(139, 94, 60, 0.1);
  }

  .option-dot {
    width: 22px; height: 22px;
    border-radius: 50%;
    border: 2px solid var(--blush);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .option-btn.selected .option-dot { background: var(--terra); border-color: var(--terra); }
  .option-btn.selected .option-dot::after {
    content: ''; width: 8px; height: 8px; background: #fff; border-radius: 50%;
  }

  /* NAVIGATION */
  .nav-row {
    display: flex;
    justify-content: space-between;
    margin-top: 30px; /* Thu hẹp khoảng cách so với câu hỏi */
    align-items: center;
  }
  .btn-back {
    background: none; border: none; color: #a08a76;
    cursor: pointer; font-size: 1rem;
  }
  .btn-next {
    background: var(--terra);
    color: #fff; border: none;
    padding: 15px 45px;
    border-radius: 60px;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s;
  }
  .btn-next:disabled { background: var(--sand); cursor: not-allowed; }

  /* RESULT SECTION */
  .result-card { background: #fff; border-radius: 32px; overflow: hidden; box-shadow: 0 15px 45px rgba(0,0,0,0.1); }
  .result-banner {
    background: #c48a97;
    padding: 45px 20px;
    color: #fff;
    text-align: center;
  }
  .result-banner .emoji { font-size: 5rem; margin-bottom: 10px; }
  .result-banner h2 { font-family: 'Playfair Display', serif; font-size: 2.2rem; }

  .result-body { padding: 35px; }
  .routine-list { list-style: none; margin: 20px 0; }
  .routine-list li { display: flex; gap: 15px; margin-bottom: 15px; }
  .step-num { 
    background: var(--soft); color: var(--terra); 
    width: 28px; height: 28px; border-radius: 50%; 
    display: flex; align-items: center; justify-content: center; 
    font-weight: 600; flex-shrink: 0;
  }
  .tips-box { background: #fdfaf7; border-left: 4px solid var(--blush); padding: 20px; font-size: 1rem; margin: 25px 0; }

  .btn-restart {
    width: 100%; padding: 16px; border-radius: 50px;
    border: 2px solid var(--terra); background: none; color: var(--terra);
    font-weight: 600; cursor: pointer;
  }

  .hidden { display: none; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  @media (max-width: 600px) {
    .question-card { padding: 25px 20px; }
    .question-text { font-size: 1.4rem; }
    .option-btn { font-size: 1rem; padding: 15px; }
  }
</style>
</head>
<body>

<div class="quiz-wrap">
  <div class="quiz-header">
    <h1>✦ Skin Quiz</h1>
    <p>Thấu hiểu làn da trong 1 phút</p>
  </div>

  <div id="quiz-section">
    <div class="progress-container">
        <div class="progress-label">Câu <span id="q-num">1</span>/10</div>
        <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width:10%"></div></div>
    </div>

    <div class="question-card" id="question-card">
      <div class="question-num" id="q-label">Câu hỏi 01</div>
      <div class="question-text" id="q-text"></div>
      <div class="options" id="options-wrap"></div>
      
      <div class="nav-row">
        <button class="btn-back" id="btn-back" onclick="goBack()">← Quay lại</button>
        <button class="btn-next" id="btn-next" onclick="goNext()" disabled>Tiếp theo</button>
      </div>
    </div>
  </div>

  <div id="result-section" class="hidden"></div>
</div>

<script>
// Dữ liệu câu hỏi và logic giữ nguyên
const questions = [
  {
    text: "Sau khi rửa mặt xong và không dưỡng gì, bạn cảm thấy da như thế nào?",
    options: [
      { label: "Căng, khô, có thể bong tróc", scores: { dry: 3 } },
      { label: "Bóng dầu nhanh chóng, đặc biệt vùng chữ T", scores: { oily: 3 } },
      { label: "Vùng chữ T dầu, má bình thường hoặc hơi khô", scores: { combo: 3 } },
      { label: "Bình thường, không khó chịu gì", scores: { normal: 3 } },
    ]
  },
  {
    text: "Vào buổi trưa, da bạn trông như thế nào nếu không touch-up?",
    options: [
      { label: "Vẫn khô hoặc bong nhẹ ở một số vùng", scores: { dry: 2 } },
      { label: "Bóng dầu toàn mặt", scores: { oily: 2 } },
      { label: "Chỉ vùng mũi và trán bóng", scores: { combo: 2 } },
      { label: "Gần như không thay đổi nhiều", scores: { normal: 2 } },
    ]
  },
  {
    text: "Lỗ chân lông của bạn trông thế nào?",
    options: [
      { label: "Hầu như không thấy lỗ chân lông", scores: { dry: 2 } },
      { label: "To và thấy rõ, đặc biệt vùng mũi", scores: { oily: 2 } },
      { label: "To ở vùng chữ T, nhỏ hơn ở má", scores: { combo: 2 } },
      { label: "Bình thường, không to cũng không nhỏ bất thường", scores: { normal: 2 } },
    ]
  },
  {
    text: "Da bạn phản ứng thế nào khi thử sản phẩm mới?",
    options: [
      { label: "Hay bị đỏ, ngứa hoặc rát", scores: { sensitive: 3 } },
      { label: "Thường bị nổi mụn", scores: { oily: 1, acne: 2 } },
      { label: "Ít khi có phản ứng", scores: { normal: 2, dry: 1 } },
      { label: "Tùy sản phẩm, đôi khi kích ứng", scores: { sensitive: 1, combo: 1 } },
    ]
  },
  {
    text: "Bạn có thường xuyên bị nổi mụn không?",
    options: [
      { label: "Thường xuyên, mụn viêm, đầu trắng/đen", scores: { oily: 2, acne: 2 } },
      { label: "Thỉnh thoảng, đặc biệt kỳ kinh nguyệt", scores: { combo: 1, acne: 1 } },
      { label: "Rất hiếm khi", scores: { dry: 1, normal: 1 } },
      { label: "Không bao giờ hoặc gần như không", scores: { normal: 2, dry: 1 } },
    ]
  },
  {
    text: "Khi thời tiết hanh khô hoặc dùng điều hòa nhiều, da bạn:",
    options: [
      { label: "Khô và bong tróc rõ rệt", scores: { dry: 3 } },
      { label: "Vẫn dầu như thường, không khác gì", scores: { oily: 2 } },
      { label: "Má hơi khô nhưng vùng T vẫn dầu", scores: { combo: 2 } },
      { label: "Hơi căng nhẹ nhưng không đáng lo", scores: { normal: 1, dry: 1 } },
    ]
  },
  {
    text: "Bạn mô tả tone da và bề mặt da của mình thế nào?",
    options: [
      { label: "Da đều màu, mịn, ít vấn đề", scores: { normal: 3 } },
      { label: "Da hay bóng, thâm mụn hoặc lỗ chân lông to", scores: { oily: 2 } },
      { label: "Da hay sần, đỏ, hoặc có vảy nhỏ", scores: { dry: 2, sensitive: 1 } },
      { label: "Vùng T bóng, vùng má đều màu hơn", scores: { combo: 3 } },
    ]
  },
  {
    text: "Sau khi thoa kem dưỡng ẩm thông thường, bạn thấy:",
    options: [
      { label: "Vẫn thấy da chưa đủ ẩm, cần thoa thêm", scores: { dry: 3 } },
      { label: "Da nặng, bít lỗ chân lông, dễ nổi mụn", scores: { oily: 2 } },
      { label: "Vùng T bóng hơn, má ổn", scores: { combo: 2 } },
      { label: "Da cảm thấy cân bằng, dễ chịu", scores: { normal: 3 } },
    ]
  },
  {
    text: "Khi ra nắng hoặc tiếp xúc gió, da bạn:",
    options: [
      { label: "Đỏ và kích ứng nhanh chóng", scores: { sensitive: 3 } },
      { label: "Bóng dầu nhiều hơn bình thường", scores: { oily: 2 } },
      { label: "Căng và khô hơn", scores: { dry: 2 } },
      { label: "Không thay đổi nhiều", scores: { normal: 2 } },
    ]
  },
  {
    text: "Bạn thường dùng bao nhiêu bước skincare hiện tại?",
    options: [
      { label: "Tối thiểu: chỉ rửa mặt & kem dưỡng", scores: { normal: 1, oily: 1 } },
      { label: "3-4 bước cơ bản", scores: { combo: 1, dry: 1 } },
      { label: "5+ bước, da tôi cần nhiều dưỡng", scores: { dry: 2, sensitive: 1 } },
      { label: "Chưa có routine ổn định", scores: { normal: 1 } },
    ]
  },
];

const skinTypes = {
  oily: {
    name: "Da Dầu", emoji: "✨",
    desc: "Da bạn tiết nhiều dầu, lỗ chân lông thường to và dễ nổi mụn. Tuy nhiên, da dầu lão hóa chậm hơn!",
    am: [{step: "Rửa mặt", note: "Gel rửa mặt có BHA"}, {step: "Serum", note: "Niacinamide kiềm dầu"}, {step: "Chống nắng", note: "Dạng gel/fluid"}],
    pm: [{step: "Tẩy trang", note: "Nước tẩy trang sạch sâu"}, {step: "Treatment", note: "BHA 2% vùng chữ T"}, {step: "Dưỡng ẩm", note: "Gel mỏng nhẹ"}],
    tips: "⚡ Đừng rửa mặt quá 2 lần/ngày để tránh mất độ ẩm tự nhiên."
  },
  dry: {
    name: "Da Khô", emoji: "🌸",
    desc: "Da bạn thiếu dầu và nước, dễ bong tróc và xuất hiện nếp nhăn sớm. Cần cấp ẩm sâu.",
    am: [{step: "Rửa mặt", note: "Dạng cream/lotion dịu nhẹ"}, {step: "Serum", note: "Hyaluronic Acid"}, {step: "Dưỡng ẩm", note: "Kem dày có Ceramide"}],
    pm: [{step: "Tẩy trang", note: "Sáp/Dầu tẩy trang"}, {step: "Serum", note: "Dầu dưỡng/Peptide"}, {step: "Mặt nạ ngủ", note: "2 lần/tuần"}],
    tips: "💧 Thoa dưỡng ẩm ngay khi da còn hơi ẩm để khóa nước tốt nhất."
  },
  combo: {
    name: "Da Hỗn Hợp", emoji: "🌿",
    desc: "Vùng chữ T đổ dầu nhưng hai má lại khô. Bạn cần chế độ chăm sóc riêng biệt cho từng vùng.",
    am: [{step: "Rửa mặt", note: "Gel cân bằng pH"}, {step: "Serum", note: "Vitamin C/Niacinamide"}, {step: "Dưỡng ẩm", note: "Gel-cream"}],
    pm: [{step: "Tẩy trang", note: "Micellar Water"}, {step: "Treatment", note: "BHA cho vùng T"}, {step: "Dưỡng ẩm", note: "Lotion thấm nhanh"}],
    tips: "🎯 Hãy dùng mặt nạ đất sét cho vùng chữ T và mặt nạ giấy cho vùng má."
  },
  sensitive: {
    name: "Da Nhạy Cảm", emoji: "🌷",
    desc: "Da dễ đỏ, rát và phản ứng với môi trường. Ưu tiên hàng đầu là phục hồi hàng rào bảo vệ da.",
    am: [{step: "Rửa mặt", note: "Sữa rửa mặt không bọt"}, {step: "Phục hồi", note: "Serum B5 / Rau má"}, {step: "Chống nắng", note: "Thuần vật lý"}],
    pm: [{step: "Tẩy trang", note: "Loại cực dịu nhẹ"}, {step: "Làm dịu", note: "Toner hoa cúc/aloe"}, {step: "Dưỡng ẩm", note: "Kem phục hồi"}],
    tips: "⚠️ Tránh xa hương liệu và các loại acid nồng độ cao."
  },
  normal: {
    name: "Da Thường", emoji: "💫",
    desc: "Làn da lý tưởng, cân bằng và ít khuyết điểm. Hãy duy trì để da luôn khỏe mạnh.",
    am: [{step: "Rửa mặt", note: "Dịu nhẹ"}, {step: "Dưỡng sáng", note: "Serum Vitamin C"}, {step: "Chống nắng", note: "SPF 50+"}],
    pm: [{step: "Làm sạch", note: "Double Cleansing"}, {step: "Chống lão hóa", note: "Retinol nồng độ thấp"}, {step: "Dưỡng ẩm", note: "Kem dưỡng ẩm cơ bản"}],
    tips: "☀️ Kem chống nắng mỗi ngày là chìa khóa để giữ làn da này mãi tươi trẻ."
  }
};

let answers = [];
let current = 0;

function renderQuestion() {
  const q = questions[current];
  const pct = ((current + 1) / questions.length) * 100;

  document.getElementById('q-num').textContent = current + 1;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('q-label').textContent = 'Câu hỏi ' + String(current + 1).padStart(2, '0');
  document.getElementById('q-text').textContent = q.text;

  const wrap = document.getElementById('options-wrap');
  wrap.innerHTML = '';
  q.options.forEach((opt, i) => {
    const btn = document.createElement('button');
    btn.className = 'option-btn' + (answers[current] === i ? ' selected' : '');
    btn.innerHTML = `<span class="option-dot"></span><span>${opt.label}</span>`;
    btn.onclick = () => selectOption(i);
    wrap.appendChild(btn);
  });

  document.getElementById('btn-back').style.visibility = current === 0 ? 'hidden' : 'visible';
  document.getElementById('btn-next').disabled = answers[current] === undefined;
  document.getElementById('btn-next').textContent = current === questions.length - 1 ? 'Xem kết quả ✦' : 'Tiếp theo';
  
  const card = document.getElementById('question-card');
  card.style.animation = 'none';
  requestAnimationFrame(() => { card.style.animation = 'fadeIn 0.4s ease'; });
}

function selectOption(i) {
  answers[current] = i;
  renderQuestion();
}

function goNext() {
  if (answers[current] === undefined) return;
  if (current < questions.length - 1) {
    current++;
    renderQuestion();
  } else {
    showResult();
  }
}

function goBack() {
  if (current > 0) { current--; renderQuestion(); }
}

function showResult() {
  const scores = { oily: 0, dry: 0, combo: 0, sensitive: 0, normal: 0 };
  questions.forEach((q, qi) => {
    const ai = answers[qi];
    const s = q.options[ai].scores;
    for (const k in s) { scores[k] += s[k]; }
  });

  let best = 'normal', bestScore = -1;
  for (const k in scores) { if (scores[k] > bestScore) { bestScore = scores[k]; best = k; } }

  const skin = skinTypes[best];
  document.getElementById('quiz-section').classList.add('hidden');
  const rs = document.getElementById('result-section');
  rs.classList.remove('hidden');

  const amSteps = skin.am.map((s, i) => `<li><span class="step-num">${i+1}</span><span class="step-text"><strong>${s.step}</strong><span>${s.note}</span></span></li>`).join('');
  const pmSteps = skin.pm.map((s, i) => `<li><span class="step-num">${i+1}</span><span class="step-text"><strong>${s.step}</strong><span>${s.note}</span></span></li>`).join('');

  rs.innerHTML = `
    <div class="result-card">
      <div class="result-banner">
        <div class="emoji">${skin.emoji}</div>
        <h2>Da bạn là ${skin.name}</h2>
      </div>
      <div class="result-body">
        <p class="result-desc">${skin.desc}</p>
        <div style="font-weight:600; color:var(--terra); margin-bottom:10px;">🌅 Gợi ý Routine Sáng:</div>
        <ul class="routine-list">${amSteps}</ul>
        <div style="font-weight:600; color:var(--terra); margin-bottom:10px;">🌙 Gợi ý Routine Tối:</div>
        <ul class="routine-list">${pmSteps}</ul>
        <div class="tips-box">${skin.tips}</div>
        <button class="btn-restart" onclick="restart()">Thực hiện lại Quiz</button>
      </div>
    </div>`;
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function restart() {
  answers = []; current = 0;
  document.getElementById('result-section').classList.add('hidden');
  document.getElementById('quiz-section').classList.remove('hidden');
  renderQuestion();
}

renderQuestion();
</script>
</body>
</html>
